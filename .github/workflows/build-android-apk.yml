name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 29
          ndk-version: 26.1.10909125
          cmake-version: '3.22.1'

      - name: setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build APK
        run: pnpm tauri android build
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125

      - name: Find and Copy APK
        run: |
          echo "=== Debugging APK Location ==="
          echo "Current working directory:"
          pwd
          echo ""
          echo "Directory structure of src-tauri:"
          ls -la src-tauri/ || echo "src-tauri not found"
          echo ""
          echo "Searching for APK files recursively in entire workspace..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "Checking Gradle build outputs:"
          find src-tauri/gen/android -path "*/build/outputs/apk*" -type d 2>/dev/null || echo "No apk output directory found"
          echo ""
          echo "Creating release-apk directory..."
          mkdir -p ./release-apk
          echo ""
          echo "Attempting to copy APK files..."
          if find . -name "*.apk" -type f 2>/dev/null | xargs -I {} cp {} ./release-apk/ 2>&1; then
            echo "Copy successful"
          else
            echo "Copy failed or no files found"
          fi
          echo ""
          echo "Contents of release-apk directory:"
          ls -lh ./release-apk/ || echo "release-apk directory is empty"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./release-apk/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./release-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
